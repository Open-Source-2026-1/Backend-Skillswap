# Spring Application Name
spring.application.name=skillswap-platform

# Spring DataSource Configuration
###    JDBC : SGDB :// HOST : PORT / DB
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/skillswap}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345678}

spring.datasource.driver-class-name=org.postgresql.Driver



# Spring Data JPA Configuration
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=pe.edu.upc.skillswap.platform.skillswap_platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
server.port=${PORT:8097}

# Swagger UI / OpenAPI
documentation.application.description=SkillSwap Platform API
documentation.application.version=1.0.0

# Rutas de acceso a Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

